<!doctype html>
<html lang="en">

    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Innoptus Live Route Tracker</title>

    <!-- Leaflet -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

    <!-- MapLibre GL JS -->
    <link
      href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>

    <!-- MapLibre GL Leaflet binding -->
    <script src="https://unpkg.com/@maplibre/maplibre-gl-leaflet/leaflet-maplibre-gl.js"></script>

    <!-- Mulish font (preconnect first for speed) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700;900&display=swap"
    />

    <!-- Preload partner stop logos so tooltips show instantly -->
    <link rel="preload" as="image" href="Sibelco_logo.png" />
    <link rel="preload" as="image" href="INDUPOL_LOGO_RGB-01-1.svg" />
    <link rel="preload" as="image" href="DEME.BR_BIG.svg" />
    <link rel="preload" as="image" href="PWC.svg" />
    <link rel="preload" as="image" href="KBC_logo.svg" />
    <link rel="preload" as="image" href="4itego.png" />

    <style>
      :root {
        --prussian-blue: #192c46;
        --bdazzled-blue: #2754a4;
        --green-munseli: #00aa77;
        --brand-white: #f9fbfb;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--prussian-blue);
        color: var(--brand-white);
        font-family: "Mulish", sans-serif;
      }

      /* ─── HEADER ──────────────────────────────────────────── */
      header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 24px;
        height: 60px;
        background: var(--prussian-blue);
        border-bottom: 2px solid var(--green-munseli);
        z-index: 9999;
        transform: translateZ(0);
      }
      .header-brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .logo-img {
        height: 35px;
        flex-shrink: 0;
      }
      .header-title {
        font-family: "Pier Sans", "Mulish", sans-serif;
        font-size: 18px;
        font-weight: 400;
        color: var(--brand-white);
        letter-spacing: 2px;
        text-transform: uppercase;
        white-space: nowrap;
      }

      /* ─── MAP ─────────────────────────────────────────────── */
      #map {
        position: fixed;
        top: 60px;
        bottom: 150px;
        left: 0;
        right: 0;
        background: var(--prussian-blue);
      }

      /* ─── MARKERS ─────────────────────────────────────────── */
      .live-marker-wrapper {
        position: relative;
        transition: transform 0.3s;
      }
      .live-ring {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 2px solid var(--green-munseli);
        position: absolute;
        top: -24px;
        left: -24px;
        animation: ring-pulse 2s infinite;
        box-shadow: 0 0 12px var(--green-munseli);
        z-index: 1;
        pointer-events: none;
      }
      .live-core {
        position: absolute;
        top: 0;
        left: 0;
        transform: translate(-50%, -50%);
        z-index: 2;
      }
      .live-core img {
        height: 18px;
        width: auto;
        display: block;
        pointer-events: none;
      }
      @keyframes ring-pulse {
        0% {
          transform: scale(0.2);
          opacity: 1;
        }
        100% {
          transform: scale(2.8);
          opacity: 0;
        }
      }

      .partner-marker {
        width: 30px;
        height: 30px;
        background: var(--prussian-blue);
        border: 3px solid var(--green-munseli);
        border-radius: 50% 50% 50% 0;
        transform: rotate(-45deg);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.4);
      }
      .partner-marker div {
        transform: rotate(45deg);
        width: 10px;
        height: 10px;
        background: var(--green-munseli);
        border-radius: 50%;
      }

      /* Popups */
      .leaflet-popup-content-wrapper {
        background: var(--prussian-blue) !important;
        color: var(--brand-white) !important;
        border: 1px solid var(--green-munseli) !important;
        font-family: "Mulish", sans-serif;
      }
      .leaflet-popup-tip {
        background: var(--prussian-blue) !important;
      }

      /* Stint tooltip */
      .stint-tt.leaflet-tooltip {
        background: var(--prussian-blue) !important;
        border: 1px solid var(--green-munseli) !important;
        box-shadow: 0 4px 12px rgba(0, 170, 119, 0.2) !important;
        color: var(--brand-white) !important;
        font-family: "Mulish", sans-serif;
        font-size: 12px;
        font-weight: 700;
        padding: 5px 10px !important;
        border-radius: 6px !important;
        white-space: nowrap;
      }
      .stint-tt.leaflet-tooltip::before {
        display: none !important;
      }
      .stint-tt-label {
        color: var(--green-munseli);
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        display: block;
        margin-bottom: 1px;
      }

      /* Route glow */
      .leaflet-overlay-pane svg {
        filter: drop-shadow(0 0 3px rgba(0, 229, 160, 0.4))
          drop-shadow(0 0 7px rgba(0, 229, 160, 0.15));
      }
      .leaflet-overlay-pane path:focus {
        outline: none !important;
      }

      /* Partner tooltip */
      .partner-tt.leaflet-tooltip {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        padding: 0 !important;
      }
      .partner-tt.leaflet-tooltip::before {
        display: none !important;
      }
      .partner-tt-inner {
        background: #fff;
        border: 2px solid var(--green-munseli);
        border-radius: 10px;
        padding: 8px 14px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        min-width: 110px;
        box-shadow: 0 4px 16px rgba(0, 170, 119, 0.25);
        pointer-events: none;
      }
      .partner-tt-inner img {
        max-height: 38px;
        max-width: 110px;
        object-fit: contain;
      }

      /* Live marker popup */
      .live-popup-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 10px 14px 2px;
      }
      .live-popup-name {
        font-size: 13px;
        font-weight: 700;
        color: var(--brand-white);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 2px;
      }
      .live-popup-label {
        color: var(--green-munseli);
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .live-popup-speed {
        font-size: 26px;
        font-weight: 900;
        color: var(--brand-white);
        line-height: 1;
      }
      .live-popup-unit {
        font-size: 11px;
        color: rgba(249, 251, 251, 0.55);
        font-weight: 600;
      }

      /* Partner popup */
      .partner-popup-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        padding: 6px 4px 2px;
      }
      .partner-popup-logo {
        background: #fff;
        border-radius: 8px;
        padding: 4px 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 140px;
        min-height: 64px;
      }
      .partner-popup-logo img {
        max-height: 72px;
        max-width: 160px;
        width: 100%;
        object-fit: contain;
      }
      .partner-popup-role {
        color: var(--green-munseli);
        font-size: 12px;
        font-weight: 700;
        text-align: center;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      .partner-popup-time {
        color: rgba(249, 251, 251, 0.7);
        font-size: 12px;
        text-align: center;
      }

      /* ─── SPONSOR MARKERS ────────────────────────────────── */
      .sponsor-marker {
        width: 12px;
        height: 12px;
        background: var(--bdazzled-blue);
        border-radius: 50%;
        box-shadow:
          0 0 0 2px rgba(39, 84, 164, 0.35),
          0 2px 6px rgba(0, 0, 0, 0.45);
      }
      .sponsor-popup-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        padding: 6px 4px 2px;
      }
      .sponsor-popup-logo {
        background: #fff;
        border-radius: 8px;
        padding: 8px 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 130px;
        min-height: 56px;
      }
      .sponsor-popup-logo.dark-bg {
        background: var(--prussian-blue);
      }
      .sponsor-popup-logo img {
        max-height: 52px;
        max-width: 140px;
        width: 100%;
        object-fit: contain;
      }
      .sponsor-popup-placeholder {
        font-size: 22px;
        font-weight: 900;
        color: var(--prussian-blue);
        opacity: 0.3;
      }
      .sponsor-popup-name {
        color: var(--brand-white);
        font-size: 13px;
        font-weight: 700;
        text-align: center;
      }
      .sponsor-popup-role {
        color: var(--green-munseli);
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      /* ─── WAITING / STALE OVERLAYS ───────────────────────── */
      #waiting-overlay,
      #stale-overlay {
        position: fixed;
        top: 78px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 2000;
        background: rgba(25, 44, 70, 0.94);
        border: 1px solid rgba(255, 170, 0, 0.75);
        border-radius: 10px;
        padding: 10px 18px;
        display: flex;
        align-items: center;
        gap: 10px;
        font-family: "Mulish", sans-serif;
        color: var(--brand-white);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s;
        backdrop-filter: blur(6px);
        white-space: nowrap;
      }
      #waiting-overlay {
        border-color: rgba(0, 170, 119, 0.75);
      }
      #waiting-overlay.visible,
      #stale-overlay.visible {
        opacity: 1;
      }
      .stale-icon {
        font-size: 18px;
      }
      .stale-title {
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }
      .stale-desc {
        font-size: 11px;
        color: rgba(249, 251, 251, 0.55);
        margin-top: 2px;
      }

      /* ─── FOOTER ──────────────────────────────────────────── */
      footer {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 150px;
        background: var(--prussian-blue);
        border-top: 2px solid var(--green-munseli);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transform: translateZ(0);
      }
      .footer-logo {
        height: 130px;
      }

      /* ─── MOBILE ───────────────────────────────────────────── */
      @media (max-width: 540px) {
        header {
          height: 52px;
          padding: 0 14px;
        }
        #map {
          top: 52px;
          bottom: 64px;
        }
        .logo-img {
          height: 26px;
        }
        .header-title {
          font-size: 14px;
          letter-spacing: 1px;
        }
        .header-brand {
          gap: 10px;
        }
        footer {
          height: 64px;
        }
        .footer-logo {
          height: 46px;
        }
        .partner-popup-logo {
          min-width: 110px;
          min-height: 50px;
          padding: 8px 10px;
        }
        .partner-popup-logo img {
          max-height: 40px;
          max-width: 110px;
        }
        .leaflet-popup-content-wrapper {
          max-width: 85vw !important;
        }
      }
    </style>
  </head>

    <header>
      <div class="header-brand">
        <img
          src="Langwerpig_TekstWit.svg"
          alt="Innoptus Logo"

        />
        <div class="header-title">Live Tracker</div>

    <div id="map"></div>

    <div id="waiting-overlay">
      <div class="stale-icon">⏳</div>
      <div>
        <div class="stale-title">Waiting for start</div>
        <div class="stale-desc">Expected start: April 28th, 9:00 AM</div>
      </div>
    </div>

    <div id="stale-overlay">
      <div class="stale-icon">⚠️</div>
      <div>
        <div class="stale-title">Location Unavailable</div>
        <div class="stale-desc">Live tracking signal lost</div>
      </div>
    </div>

    <footer>
      <img src="Logo_TSHR.png" alt="TSHR Logo" class="footer-logo" />
    </footer>

    <script src="routeData.js"></script>
    <script>
      // ─── CONFIG ────────────────────────────────────────────
      const GPS_ENDPOINT =
        "https://solar-tracker-ab9a8-default-rtdb.europe-west1.firebasedatabase.app/gps/latest.json";
      let liveMarker = null;
      let firstFix = true;

      // ─── PARTNERS ──────────────────────────────────────────
      const PARTNERS = [

        },
      ];

      // ─── MAP INIT ──────────────────────────────────────────
      const allPoints = STINTS.flat();
      const routeBounds = L.latLngBounds(allPoints);

      const map = L.map("map", {
        center: routeBounds.getCenter(),
        zoom: 10,
        minZoom: 9,
        maxZoom: 18,
        zoomControl: false,
        attributionControl: false,
      });

      // ─── BOOTSTRAP ─────────────────────────────────────────
      fetch("mapStyle.json") // 👈 path to your JSON file
        .then((r) => r.json())
        .then((style) => {
          L.maplibreGL({
            style,
          }).addTo(map);
          addOverlays();
          setTimeout(centreOnLive, 600);
        })
        .catch((err) => {
          console.warn("Style failed, falling back to CARTO:", err);
          L.tileLayer(
            "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
            {
              maxZoom: 20,
              subdomains: "abcd",
              attribution: "© OpenStreetMap © CARTO",

      function addOverlays() {
        STINTS.forEach((coords, i) => {
          L.polyline(coords, {
            color: "#00aa77",
            weight: 5,
            opacity: 0.85,
            interactive: false,
          }).addTo(map);
          L.polyline(coords, { color: "#00aa77", weight: 22, opacity: 0.001 })
            .addTo(map)
            .bindTooltip(
              `<span class="stint-tt-label">${STINT_TIMES[i].label}</span>${STINT_TIMES[i].time}`,
              { className: "stint-tt", sticky: true },
            )
            .on("mousedown", (e) => L.DomEvent.stop(e))
            .on("click", (e) => L.DomEvent.stop(e))
            .on("dblclick", (e) => L.DomEvent.stop(e));
        });

        const partnerIcon = L.divIcon({
          className: "",
          iconSize: [30, 30],
          iconAnchor: [15, 36],
          html: '<div class="partner-marker"><div></div></div>',
        });

        const isTouch =
          "ontouchstart" in window || navigator.maxTouchPoints > 0;

        PARTNERS.forEach((p) => {
          const ttHtml = `<div class="partner-tt-inner"><img src="${p.logo}" alt="${p.role}" /></div>`;
          const popupHtml = `
            <div class="partner-popup-inner">
              <div class="partner-popup-logo"><img src="${p.logo}" alt="${p.role}" /></div>
              <div class="partner-popup-role">${p.role}</div>
              ${p.time ? `<div class="partner-popup-time">${p.time}</div>` : ""}
            </div>`;
          const marker = L.marker(p.coords, { icon: partnerIcon })
            .addTo(map)
            .bindPopup(popupHtml, { maxWidth: 220 });
          if (!isTouch) {
            marker.bindTooltip(ttHtml, {
              className: "partner-tt",
              direction: "top",
              offset: [0, -22],
            });
          }
        });

        const sponsorIcon = L.divIcon({
          className: "",
          iconSize: [12, 12],
          iconAnchor: [6, 6],
          html: '<div class="sponsor-marker"></div>',
        });

        SPONSORS.forEach((s) => {
          const logoContent = s.logo
            ? `<img src="${s.logo}" alt="${s.name}" />`
            : `<span class="sponsor-popup-placeholder">${s.name[0]}</span>`;
          const popupHtml = `
            <div class="sponsor-popup-inner">
              <div class="sponsor-popup-logo${s.darkBg ? " dark-bg" : ""}">${logoContent}</div>
              <div class="sponsor-popup-name">${s.name}</div>
              <div class="sponsor-popup-role">Partner</div>
            </div>`;
          L.marker(s.coords, { icon: sponsorIcon })
            .addTo(map)
            .bindPopup(popupHtml, { maxWidth: 200 });
        });

        map.fitBounds(routeBounds, { padding: [50, 50] });
      }

      // ─── ZOOM SCALE ────────────────────────────────────────
      map.on("zoomend", () => {
        const z = map.getZoom();
        const w = document.querySelector(".live-marker-wrapper");
        if (!w) return;
        const s =
          z <= 9 ? 0.45 : z <= 10 ? 0.6 : z <= 11 ? 0.75 : z <= 12 ? 0.9 : 1;
        w.style.transform = `scale(${s})`;
      });

      // ─── LIVE GPS ──────────────────────────────────────────
      function speedPopupHtml(kmh) {
        return `<div class="live-popup-inner">
          <div class="live-popup-name">Infinite Apollo</div>
          <div class="live-popup-label">Current Speed</div>
          <div class="live-popup-speed">${kmh}</div>
          <div class="live-popup-unit">km/h</div>
        </div>`;
      }

      function createLiveMarker(lat, lng, kmh = 0) {
        return L.marker([lat, lng], {
          icon: L.divIcon({
            className: "",
            iconSize: [0, 0],
            html: `<div class="live-marker-wrapper">
                    <div class="live-ring"></div>
                    <div class="live-core"><img src="innoptus_icon_wit.png" alt="Innoptus" /></div>
                  </div>`,
          }),
          zIndexOffset: 1000,
        })
          .addTo(map)
          .bindPopup(speedPopupHtml(kmh), { maxWidth: 160 });
      }

      let lastGpsUpdate = null;

      function centreOnLive() {
        if (liveMarker && firstFix) {
          map.flyTo(liveMarker.getLatLng(), 12, {
            animate: true,
            duration: 1.8,
          });
          firstFix = false;
        }
      }

      async function fetchLivePosition() {
        try {
          const data = await (await fetch(GPS_ENDPOINT)).json();
          if (!data || data.lat === undefined) return;
          const kmh = Math.round(data.speed || 0);
          lastGpsUpdate = Date.now();
          document.getElementById("stale-overlay").classList.remove("visible");
          document
            .getElementById("waiting-overlay")
            .classList.remove("visible");
          if (!liveMarker) {
            liveMarker = createLiveMarker(data.lat, data.lng, kmh);
          } else {
            liveMarker.setLatLng([data.lat, data.lng]);
            liveMarker.setPopupContent(speedPopupHtml(kmh));
          }
          if (firstFix) {
            map.stop();
            map.flyTo([data.lat, data.lng], 12, {
              animate: true,
              duration: 1.8,
            });
            firstFix = false;
          }
        } catch (e) {
          console.error("GPS Fetch Error", e);
        }
      }

      // Show stale overlay when GPS hasn't updated in 60s
      setInterval(() => {
        if (lastGpsUpdate !== null && Date.now() - lastGpsUpdate > 60000) {
          document.getElementById("stale-overlay").classList.add("visible");
        }
      }, 3000);

      // ─── FAKE LIVE MARKER (temporary — replace with live tracking below) ──
      const _fakePos = STINTS[0][0];
      liveMarker = createLiveMarker(_fakePos[0], _fakePos[1], 0);
      document.getElementById("waiting-overlay").classList.add("visible");
      // lastGpsUpdate = Date.now() - 70000; // ← uncomment to test stale overlay
      // ── END FAKE MARKER ─────────────────────────────────────────────────

      // Uncomment to enable live tracking (and remove fake marker above):
      // setInterval(fetchLivePosition, 30000);
      // fetchLivePosition();
    </script>
  </body>
</html>
