<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Innoptus Live Route Tracker</title>

    <!-- Leaflet -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

    <!-- MapLibre GL JS -->
    <link
      href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>

    <!-- MapLibre GL Leaflet binding -->
    <script src="https://unpkg.com/@maplibre/maplibre-gl-leaflet/leaflet-maplibre-gl.js"></script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Muli:wght@400;600;700;900&display=swap");

      :root {
        --prussian-blue: #192c46;
        --bdazzled-blue: #2754a4;
        --green-munseli: #00aa77;
        --brand-white: #f9fbfb;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--prussian-blue);
        color: var(--brand-white);
        font-family: "Muli", sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ─── HEADER ──────────────────────────────────────────── */
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        height: 60px;
        background: var(--prussian-blue);
        border-bottom: 2px solid var(--green-munseli);
        z-index: 1000;
      }
      .logo-img {
        height: 35px;
      }
      .live-badge {
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(0, 170, 119, 0.15);
        border: 1px solid var(--green-munseli);
        border-radius: 4px;
        padding: 6px 16px;
        font-weight: 900;
        font-size: 14px;
        color: var(--green-munseli);
      }
      .live-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--green-munseli);
        animation: pulse 1.5s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(0.8);
          opacity: 0.5;
        }
      }

      /* ─── MAP ─────────────────────────────────────────────── */
      #map {
        flex: 1;
        background: var(--prussian-blue);
      }

      /* ─── MARKERS ─────────────────────────────────────────── */
      .live-marker-wrapper {
        position: relative;
        transition: transform 0.3s;
      }
      .live-ring {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 2px solid var(--green-munseli);
        position: absolute;
        top: -22px;
        left: -22px;
        animation: ring-pulse 2s infinite;
        box-shadow: 0 0 12px var(--green-munseli);
      }
      .live-core {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: var(--green-munseli);
        border: 2px solid #0d1b2e;
        position: absolute;
        top: -8px;
        left: -8px;
        box-shadow:
          0 0 20px var(--green-munseli),
          0 0 40px rgba(0, 229, 160, 0.4);
      }
      @keyframes ring-pulse {
        0% {
          transform: scale(1);
          opacity: 0.9;
        }
        100% {
          transform: scale(2.5);
          opacity: 0;
        }
      }

      .partner-marker {
        width: 24px;
        height: 24px;
        background: var(--brand-white);
        border: 3px solid var(--green-munseli);
        border-radius: 50% 50% 50% 0;
        transform: rotate(-45deg);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 10px rgba(0, 229, 160, 0.5);
      }
      .partner-marker div {
        transform: rotate(45deg);
        width: 8px;
        height: 8px;
        background: var(--prussian-blue);
        border-radius: 50%;
      }

      /* Popups */
      .leaflet-popup-content-wrapper {
        background: var(--prussian-blue) !important;
        color: var(--brand-white) !important;
        border: 1px solid var(--green-munseli) !important;
        font-family: "Muli", sans-serif;
      }
      .leaflet-popup-tip {
        background: var(--prussian-blue) !important;
      }

      /* Stint tooltip */
      .stint-tt.leaflet-tooltip {
        background: var(--prussian-blue) !important;
        border: 1px solid var(--green-munseli) !important;
        box-shadow: 0 4px 12px rgba(0, 170, 119, 0.2) !important;
        color: var(--brand-white) !important;
        font-family: "Muli", sans-serif;
        font-size: 12px;
        font-weight: 700;
        padding: 5px 10px !important;
        border-radius: 6px !important;
        white-space: nowrap;
      }
      .stint-tt.leaflet-tooltip::before {
        display: none !important;
      }
      .stint-tt-label {
        color: var(--green-munseli);
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        display: block;
        margin-bottom: 1px;
      }

      /* Route glow */
      .leaflet-overlay-pane svg {
        filter: drop-shadow(0 0 3px rgba(0, 229, 160, 0.4))
          drop-shadow(0 0 7px rgba(0, 229, 160, 0.15));
      }
      .leaflet-overlay-pane path:focus {
        outline: none !important;
      }

      /* Partner tooltip */
      .partner-tt.leaflet-tooltip {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        padding: 0 !important;
      }
      .partner-tt.leaflet-tooltip::before {
        display: none !important;
      }
      .partner-tt-inner {
        background: #fff;
        border: 2px solid var(--green-munseli);
        border-radius: 10px;
        padding: 8px 14px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        min-width: 110px;
        box-shadow: 0 4px 16px rgba(0, 170, 119, 0.25);
        pointer-events: none;
      }
      .partner-tt-inner img {
        max-height: 38px;
        max-width: 110px;
        object-fit: contain;
      }

      /* Partner popup */
      .partner-popup-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        padding: 6px 4px 2px;
      }
      .partner-popup-logo {
        background: #fff;
        border-radius: 8px;
        padding: 10px 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 140px;
        min-height: 64px;
      }
      .partner-popup-logo img {
        max-height: 52px;
        max-width: 140px;
        object-fit: contain;
      }
      .partner-popup-role {
        color: var(--green-munseli);
        font-size: 12px;
        font-weight: 700;
        text-align: center;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      .partner-popup-time {
        color: rgba(249, 251, 251, 0.7);
        font-size: 12px;
        text-align: center;
      }

      /* ─── FOOTER ──────────────────────────────────────────── */
      footer {
        height: 88px;
        background: var(--prussian-blue);
        border-top: 2px solid var(--green-munseli);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        flex-shrink: 0;
      }
      .footer-logo {
        height: 68px;
      }
    </style>
  </head>
  <body>
    <header>
      <img src="Langwerpig_TekstWit.svg" alt="Innoptus Logo" class="logo-img" />
      <div class="live-badge">
        <div class="live-dot"></div>
        LIVE
      </div>
    </header>

    <div id="map"></div>

    <footer>
      <img src="Logo_TSHR.png" alt="TSHR Logo" class="footer-logo" />
    </footer>

    <script src="routeData.js"></script>
    <script>
      // ─── CONFIG ────────────────────────────────────────────
      const GPS_ENDPOINT =
        "https://solar-tracker-ab9a8-default-rtdb.europe-west1.firebasedatabase.app/gps/latest.json";
      let liveMarker = null;
      let firstFix = true;

      // ─── PARTNERS ──────────────────────────────────────────
      const PARTNERS = [
        {
          role: "Start",
          time: "07:30 – 09:00",
          coords: STINTS[0][0],
          logo: "Sibelco_logo.png",
        },
        {
          role: "Second Stop",
          time: "09:30 – 10:00",
          coords: STINTS[1][0],
          logo: "INDUPOL_LOGO_RGB-01-1.svg",
        },
        {
          role: "Third Stop",
          time: "12:00 – 12:30",
          coords: STINTS[2][0],
          logo: "DEME.BR_BIG.svg",
        },
        {
          role: "Fourth Stop",
          time: "14:00 – 15:00",
          coords: STINTS[3][0],
          logo: "PWC.svg",
        },
        {
          role: "Fifth Stop",
          time: "16:00 – 17:00",
          coords: STINTS[4][0],
          logo: "KBC_logo.svg",
        },
        {
          role: "Finish",
          time: "17:30 – 19:00",
          coords: STINTS[4][STINTS[4].length - 1],
          logo: "4itego.png",
        },
      ];

      // ─── MAP INIT ──────────────────────────────────────────
      const allPoints = STINTS.flat();
      const routeBounds = L.latLngBounds(allPoints);

      const map = L.map("map", {
        center: routeBounds.getCenter(),
        zoom: 10,
        maxBounds: routeBounds.pad(0.2),
        maxBoundsViscosity: 1.0,
        minZoom: 10,
        maxZoom: 18,
        zoomControl: false,
      });

      // ─── BOOTSTRAP ─────────────────────────────────────────
      fetch("mapStyle.json") // 👈 path to your JSON file
        .then((r) => r.json())
        .then((style) => {
          L.maplibreGL({
            style,
          }).addTo(map);
          addOverlays();
        })
        .catch((err) => {
          console.warn("Style failed, falling back to CARTO:", err);
          L.tileLayer(
            "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
            {
              maxZoom: 20,
              subdomains: "abcd",
              attribution: "© OpenStreetMap © CARTO",
            },
          ).addTo(map);
          addOverlays();
        });

      // ─── OVERLAYS (routes + markers) ───────────────────────
      const STINT_TIMES = [
        { label: "Stint 1", time: "09:00 – 09:30" },
        { label: "Stint 2", time: "10:00 – 12:00" },
        { label: "Stint 3", time: "12:30 – 14:00" },
        { label: "Stint 4", time: "15:00 – 16:00" },
        { label: "Stint 5", time: "17:00 – 17:30" },
      ];

      function addOverlays() {
        STINTS.forEach((coords, i) => {
          L.polyline(coords, {
            color: "#00aa77",
            weight: 5,
            opacity: 0.85,
            interactive: false,
          }).addTo(map);
          L.polyline(coords, { color: "#00aa77", weight: 22, opacity: 0.001 })
            .addTo(map)
            .bindTooltip(
              `<span class="stint-tt-label">${STINT_TIMES[i].label}</span>${STINT_TIMES[i].time}`,
              { className: "stint-tt", sticky: true },
            )
            .on("click", (e) => L.DomEvent.stopPropagation(e));
        });

        const partnerIcon = L.divIcon({
          className: "",
          iconSize: [24, 24],
          iconAnchor: [12, 24],
          html: '<div class="partner-marker"><div></div></div>',
        });

        PARTNERS.forEach((p) => {
          const ttHtml = `<div class="partner-tt-inner"><img src="${p.logo}" alt="${p.role}" /></div>`;
          const popupHtml = `
            <div class="partner-popup-inner">
              <div class="partner-popup-logo"><img src="${p.logo}" alt="${p.role}" /></div>
              <div class="partner-popup-role">${p.role}</div>
              ${p.time ? `<div class="partner-popup-time">${p.time}</div>` : ""}
            </div>`;
          L.marker(p.coords, { icon: partnerIcon })
            .addTo(map)
            .bindTooltip(ttHtml, {
              className: "partner-tt",
              direction: "top",
              offset: [0, -22],
            })
            .bindPopup(popupHtml, { maxWidth: 220 });
        });

        map.fitBounds(routeBounds, { padding: [50, 50] });
      }

      // ─── ZOOM SCALE ────────────────────────────────────────
      map.on("zoomend", () => {
        const z = map.getZoom();
        const w = document.querySelector(".live-marker-wrapper");
        if (w) w.style.transform = `scale(${z < 9 ? 0.5 : z < 12 ? 0.8 : 1.2})`;
      });

      // ─── LIVE GPS ──────────────────────────────────────────
      function createLiveMarker(lat, lng) {
        return L.marker([lat, lng], {
          icon: L.divIcon({
            className: "",
            iconSize: [0, 0],
            html: `<div class="live-marker-wrapper">
                    <div class="live-ring"></div>
                    <div class="live-core"></div>
                  </div>`,
          }),
          zIndexOffset: 1000,
        }).addTo(map);
      }

      async function fetchLivePosition() {
        try {
          const data = await (await fetch(GPS_ENDPOINT)).json();
          if (!data || data.lat === undefined) return;
          if (!liveMarker) liveMarker = createLiveMarker(data.lat, data.lng);
          else liveMarker.setLatLng([data.lat, data.lng]);
          if (firstFix) {
            map.flyTo([data.lat, data.lng], 14, {
              animate: true,
              duration: 2.5,
            });
            firstFix = false;
          }
        } catch (e) {
          console.error("GPS Fetch Error", e);
        }
      }

      // Uncomment to enable live tracking:
      // setInterval(fetchLivePosition, 30000);
      // fetchLivePosition();
    </script>
  </body>
</html>
