<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Innoptus Live Route Tracker</title>

    <!-- Leaflet -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

    <!-- MapLibre GL JS -->
    <link
      href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>

    <!-- MapLibre GL Leaflet binding -->
    <script src="https://unpkg.com/@maplibre/maplibre-gl-leaflet/leaflet-maplibre-gl.js"></script>

    <!-- Confetti -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script> -->

    <!-- Mulish font (preconnect first for speed) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700;900&display=swap"
    />

    <!-- Preload partner stop logos so tooltips show instantly -->
    <link rel="preload" as="image" href="Sibelco_logo.png" />
    <link rel="preload" as="image" href="INDUPOL_LOGO_RGB-01-1.svg" />
    <link rel="preload" as="image" href="DEME.BR_BIG.svg" />
    <link rel="preload" as="image" href="PWC.svg" />
    <link rel="preload" as="image" href="KBC_logo.svg" />
    <link rel="preload" as="image" href="4itego.png" />

    <style>
      :root {
        --prussian-blue: #192c46;
        --bdazzled-blue: #2754a4;
        --break-blue: #4a7fd4;
        --green-munseli: #00aa77;
        --brand-white: #f9fbfb;
        --amber: #f5a623;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* ─── LAYOUT: flex column fills full iframe height ─────── */
      html,
      body {
        height: 100dvh;
        overflow: hidden;
      }

      body {
        background: var(--prussian-blue);
        color: var(--brand-white);
        font-family: "Mulish", sans-serif;
        display: flex;
        flex-direction: column;
      }

      /* ─── HEADER ──────────────────────────────────────────── */
      header {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 24px;
        height: 60px;
        background: var(--prussian-blue);
        border-bottom: 2px solid var(--green-munseli);
        position: relative;
        z-index: 9999;
      }
      .header-brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .logo-img {
        height: 35px;
        flex-shrink: 0;
      }
      .header-title {
        font-family: "Pier Sans", "Mulish", sans-serif;
        font-size: 18px;
        font-weight: 400;
        color: var(--brand-white);
        letter-spacing: 2px;
        text-transform: uppercase;
        white-space: nowrap;
      }

      /* ─── MAP ─────────────────────────────────────────────── */
      #map {
        flex: 1;
        position: relative;
        background: var(--prussian-blue);
        z-index: 1;
      }

      /* ─── MARKERS ─────────────────────────────────────────── */
      .live-marker-wrapper {
        position: relative;
        transition: transform 0.3s;
      }
      .live-ring {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 2px solid var(--green-munseli);
        position: absolute;
        top: -24px;
        left: -24px;
        animation: ring-pulse 2s infinite;
        box-shadow: 0 0 12px var(--green-munseli);
        z-index: 1;
        pointer-events: none;
      }
      .live-ring.paused {
        display: none;
      }
      .live-core {
        position: absolute;
        top: 0;
        left: 0;
        transform: translate(-50%, -50%);
        z-index: 2;
      }
      .live-core img {
        height: 18px;
        width: auto;
        display: block;
        pointer-events: none;
      }
      @keyframes ring-pulse {
        0% {
          transform: scale(0.2);
          opacity: 1;
        }
        100% {
          transform: scale(2.8);
          opacity: 0;
        }
      }

      /* Partner stop marker (teardrop) */
      .partner-marker {
        width: 30px;
        height: 30px;
        background: var(--prussian-blue);
        border: 3px solid var(--green-munseli);
        border-radius: 50% 50% 50% 0;
        transform: rotate(-45deg);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.4);
      }
      .partner-marker div {
        transform: rotate(45deg);
        width: 10px;
        height: 10px;
        background: var(--green-munseli);
        border-radius: 50%;
      }

      /* ─── BREAK MARKER ───────────────────────────────────── */
      .break-marker {
        width: 20px;
        height: 20px;
        background: var(--prussian-blue);
        border: 2px solid var(--break-blue);
        border-radius: 50% 50% 50% 0;
        transform: rotate(-45deg);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.35);
      }
      .break-marker div {
        transform: rotate(45deg);
        width: 7px;
        height: 7px;
        background: var(--break-blue);
        border-radius: 50%;
      }

      /* Popups */
      .leaflet-popup-content-wrapper {
        background: var(--prussian-blue) !important;
        color: var(--brand-white) !important;
        border: 1px solid var(--green-munseli) !important;
        font-family: "Mulish", sans-serif;
      }
      .leaflet-popup-tip {
        background: var(--prussian-blue) !important;
      }

      /* Stint tooltip */
      .stint-tt.leaflet-tooltip {
        background: var(--prussian-blue) !important;
        border: 1px solid var(--green-munseli) !important;
        box-shadow: 0 4px 12px rgba(0, 170, 119, 0.2) !important;
        color: var(--brand-white) !important;
        font-family: "Mulish", sans-serif;
        font-size: 12px;
        font-weight: 700;
        padding: 5px 10px !important;
        border-radius: 6px !important;
        white-space: nowrap;
      }
      .stint-tt.leaflet-tooltip::before {
        display: none !important;
      }
      .stint-tt-label {
        color: var(--green-munseli);
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        display: block;
        margin-bottom: 1px;
      }

      /* Route glow */
      .leaflet-overlay-pane svg {
        filter: drop-shadow(0 0 3px rgba(0, 229, 160, 0.4))
          drop-shadow(0 0 7px rgba(0, 229, 160, 0.15));
      }
      .leaflet-overlay-pane path:focus {
        outline: none !important;
      }

      /* Partner tooltip */
      .partner-tt.leaflet-tooltip {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        padding: 0 !important;
      }
      .partner-tt.leaflet-tooltip::before {
        display: none !important;
      }
      .partner-tt-inner {
        background: #fff;
        border: 2px solid var(--green-munseli);
        border-radius: 10px;
        padding: 8px 14px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        min-width: 110px;
        box-shadow: 0 4px 16px rgba(0, 170, 119, 0.25);
        pointer-events: none;
      }
      .partner-tt-inner img {
        max-height: 38px;
        max-width: 110px;
        object-fit: contain;
      }

      /* Break tooltip */
      .break-tt.leaflet-tooltip {
        background: var(--prussian-blue) !important;
        border: 1px solid var(--break-blue) !important;
        box-shadow: 0 4px 12px rgba(74, 127, 212, 0.2) !important;
        color: var(--brand-white) !important;
        font-family: "Mulish", sans-serif;
        font-size: 12px;
        font-weight: 700;
        padding: 5px 10px !important;
        border-radius: 6px !important;
        white-space: nowrap;
      }
      .break-tt.leaflet-tooltip::before {
        display: none !important;
      }
      .break-tt-label {
        color: var(--break-blue);
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        display: block;
        margin-bottom: 1px;
      }

      /* Live marker popup */
      .live-popup-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 10px 14px 2px;
      }
      .live-popup-name {
        font-size: 13px;
        font-weight: 700;
        color: var(--brand-white);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 2px;
      }
      .live-popup-label {
        color: var(--green-munseli);
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .live-popup-speed {
        font-size: 26px;
        font-weight: 900;
        color: var(--brand-white);
        line-height: 1;
      }
      .live-popup-unit {
        font-size: 11px;
        color: rgba(249, 251, 251, 0.55);
        font-weight: 600;
      }
      .live-popup-time {
        font-size: 10px;
        color: rgba(249, 251, 251, 0.4);
        margin-top: 4px;
        font-weight: 400;
      }

      /* Partner popup */
      .partner-popup-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        padding: 6px 4px 2px;
      }
      .partner-popup-logo {
        background: #fff;
        border-radius: 8px;
        padding: 4px 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 140px;
        min-height: 64px;
      }
      .partner-popup-logo img {
        max-height: 72px;
        max-width: 160px;
        width: 100%;
        object-fit: contain;
      }
      .partner-popup-role {
        color: var(--green-munseli);
        font-size: 12px;
        font-weight: 700;
        text-align: center;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
      .partner-popup-time {
        color: rgba(249, 251, 251, 0.7);
        font-size: 12px;
        text-align: center;
      }

      /* Break popup */
      .break-popup .leaflet-popup-content-wrapper {
        border-color: var(--break-blue) !important;
      }
      .break-popup .leaflet-popup-tip {
        background: var(--prussian-blue) !important;
      }
      .break-popup-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        padding: 4px 8px 2px;
      }
      .break-popup-icon {
        font-size: 16px;
        line-height: 1;
      }
      .break-popup-name {
        font-size: 11px;
        font-weight: 700;
        color: var(--break-blue);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        text-align: center;
      }
      .break-popup-time {
        color: rgba(249, 251, 251, 0.7);
        font-size: 11px;
        text-align: center;
      }

      /* ─── SPONSOR MARKERS ────────────────────────────────── */
      .sponsor-marker {
        width: 12px;
        height: 12px;
        background: var(--bdazzled-blue);
        border-radius: 50%;
        box-shadow:
          0 0 0 2px rgba(39, 84, 164, 0.35),
          0 2px 6px rgba(0, 0, 0, 0.45);
      }
      .sponsor-popup-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        padding: 6px 4px 2px;
      }
      .sponsor-popup-logo {
        background: #fff;
        border-radius: 8px;
        padding: 8px 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 130px;
        min-height: 56px;
      }
      .sponsor-popup-logo.dark-bg {
        background: var(--prussian-blue);
      }
      .sponsor-popup-logo img {
        max-height: 52px;
        max-width: 140px;
        width: 100%;
        object-fit: contain;
      }
      .sponsor-popup-placeholder {
        font-size: 22px;
        font-weight: 900;
        color: var(--prussian-blue);
        opacity: 0.3;
      }
      .sponsor-popup-name {
        color: var(--brand-white);
        font-size: 13px;
        font-weight: 700;
        text-align: center;
      }
      .sponsor-popup-role {
        color: var(--green-munseli);
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      /* ─── WAITING / STALE OVERLAYS ───────────────────────── */
      #waiting-overlay,
      #stale-overlay,
      #finish-overlay {
        position: absolute;
        top: 18px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 2000;
        background: rgba(25, 44, 70, 0.94);
        border: 1px solid rgba(255, 170, 0, 0.75);
        border-radius: 10px;
        padding: 10px 18px;
        display: flex;
        align-items: center;
        gap: 10px;
        font-family: "Mulish", sans-serif;
        color: var(--brand-white);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s;
        backdrop-filter: blur(6px);
        white-space: nowrap;
      }
      #waiting-overlay {
        border-color: rgba(0, 170, 119, 0.75);
      }
      #finish-overlay {
        border-color: var(--green-munseli);
        pointer-events: auto;
        cursor: pointer;
      }
      #waiting-overlay.visible,
      #stale-overlay.visible,
      #finish-overlay.visible {
        opacity: 1;
      }
      .stale-icon {
        font-size: 18px;
      }
      .stale-title {
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.8px;
      }
      .stale-desc {
        font-size: 11px;
        color: rgba(249, 251, 251, 0.55);
        margin-top: 2px;
      }

      /* ─── FOOTER ──────────────────────────────────────────── */
      footer {
        flex-shrink: 0;
        height: 150px;
        background: var(--prussian-blue);
        border-top: 2px solid var(--green-munseli);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        z-index: 9999;
      }
      .footer-logo {
        height: 130px;
      }

      /* ─── MOBILE ───────────────────────────────────────────── */
      @media (max-width: 540px) {
        header {
          height: 52px;
          padding: 0 14px;
        }
        .logo-img {
          height: 26px;
        }
        .header-title {
          font-size: 14px;
          letter-spacing: 1px;
        }
        .header-brand {
          gap: 10px;
        }
        footer {
          height: 64px;
        }
        .footer-logo {
          height: 46px;
        }
        .partner-popup-logo {
          min-width: 110px;
          min-height: 50px;
          padding: 8px 10px;
        }
        .partner-popup-logo img {
          max-height: 40px;
          max-width: 110px;
        }
        .leaflet-popup-content-wrapper {
          max-width: 85vw !important;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-brand">
        <img
          src="Langwerpig_TekstWit.svg"
          alt="Innoptus Logo"
          class="logo-img"
        />
        <div class="header-title">Live Tracker</div>
      </div>
    </header>

    <div id="map">
      <div id="waiting-overlay">
        <div class="stale-icon">⏳</div>
        <div>
          <div class="stale-title">Waiting for start</div>
          <div class="stale-desc">Expected start: April 28th, 9:00 AM</div>
        </div>
      </div>

      <div id="finish-overlay" onclick="this.classList.remove('visible')">
        <div class="stale-icon">🏁</div>
        <div>
          <div class="stale-title">Infinite Apollo has arrived!</div>
          <div class="stale-desc">Thanks for following along!</div>
        </div>
      </div>

      <div id="stale-overlay">
        <div class="stale-icon">⚠️</div>
        <div>
          <div class="stale-title">Location Unavailable</div>
          <div class="stale-desc">Showing last known location</div>
        </div>
      </div>
    </div>

    <footer>
      <img src="Logo_TSHR.png" alt="TSHR Logo" class="footer-logo" />
    </footer>

    <script src="routeData.js"></script>
    <script>
      // ─── CONFIG ────────────────────────────────────────────
      const GPS_ENDPOINT =
        "https://solar-tracker-ab9a8-default-rtdb.europe-west1.firebasedatabase.app/gps/latest.json";
      let liveMarker = null;
      let firstFix = true;

      // ─── SCHEDULE ──────────────────────────────────────────
      // STINTS array index:  0=1_1, 1=1_2, 2=2_1, 3=2_2, 4=3_1, 5=3_2, 6=4_1, 7=4_2, 8=5_1, 9=5_2
      const STINT_TIMES = [
        { label: "Stint 1", time: "09:00 – 09:15" },
        { label: "Stint 2", time: "09:25 – 09:30" },
        { label: "Stint 3", time: "10:00 – 11:00" },
        { label: "Stint 4", time: "11:45 – 12:00" },
        { label: "Stint 5", time: "12:30 – 13:30" },
        { label: "Stint 6", time: "13:55 – 14:00" },
        { label: "Stint 7", time: "15:00 – 15:35" },
        { label: "Stint 8", time: "15:55 – 16:00" },
        { label: "Stint 9", time: "17:00 – 17:15" },
        { label: "Stint 10", time: "17:20 – 17:30" },
      ];

      // ─── SCHEDULED BREAK LOCATIONS ─────────────────────────
      // Each break is the last point of a Stint x_1 segment
      const SCHEDULED_BREAKS = [
        {
          name: "Scheduled Break",
          time: "09:15 – 09:25",
          coords: BREAK_LOCATIONS[0],
        },
        {
          name: "Lunch Break",
          time: "11:00 – 11:45",
          coords: BREAK_LOCATIONS[1],
        },
        {
          name: "Scheduled Break",
          time: "13:30 – 13:55",
          coords: BREAK_LOCATIONS[2],
        },
        {
          name: "Photo Break",
          time: "15:35 – 15:55",
          coords: BREAK_LOCATIONS[3],
        },
        {
          name: "Photo Break",
          time: "17:15 – 17:20",
          coords: BREAK_LOCATIONS[4],
        },
      ];

      // ─── PARTNERS ──────────────────────────────────────────
      // Partner stop coords = start of each x_2 segment = end of each x_1 segment... no:
      // Start (Sibelco)  = STINTS[0][0]  (start of Stint 1_1)
      // Stop 2 (Indupol) = STINTS[1][STINTS[1].length-1]  (end of Stint 1_2)
      // Stop 3 (DEME)    = STINTS[3][STINTS[3].length-1]  (end of Stint 2_2)
      // Stop 4 (PWC)     = STINTS[5][STINTS[5].length-1]  (end of Stint 3_2)
      // Stop 5 (KBC)     = STINTS[7][STINTS[7].length-1]  (end of Stint 4_2)
      // Finish (4itego)  = STINTS[9][STINTS[9].length-1]  (end of Stint 5_2)
      const PARTNERS = [
        {
          role: "Start",
          time: "07:30 – 09:00",
          coords: STINTS[0][0],
          logo: "Sibelco_logo.png",
        },
        {
          role: "Second Stop",
          time: "09:30 – 10:00",
          coords: STINTS[1][STINTS[1].length - 1],
          logo: "INDUPOL_LOGO_RGB-01-1.svg",
        },
        {
          role: "Third Stop",
          time: "12:00 – 12:30",
          coords: STINTS[3][STINTS[3].length - 1],
          logo: "DEME.BR_BIG.svg",
        },
        {
          role: "Fourth Stop",
          time: "14:00 – 15:00",
          coords: STINTS[5][STINTS[5].length - 1],
          logo: "PWC.svg",
        },
        {
          role: "Fifth Stop",
          time: "16:00 – 17:00",
          coords: STINTS[7][STINTS[7].length - 1],
          logo: "KBC_logo.svg",
        },
        {
          role: "Finish",
          time: "17:30 – 19:00",
          coords: STINTS[9][STINTS[9].length - 1],
          logo: "4itego.png",
        },
      ];

      // ─── MAP INIT ──────────────────────────────────────────
      const allPoints = STINTS.flat();
      const routeBounds = L.latLngBounds(allPoints);

      const map = L.map("map", {
        center: routeBounds.getCenter(),
        zoom: 10,
        minZoom: 9,
        maxZoom: 18,
        zoomControl: false,
        attributionControl: false,
      });

      // ─── BOOTSTRAP ─────────────────────────────────────────
      fetch("mapStyle.json")
        .then((r) => r.json())
        .then((style) => {
          L.maplibreGL({ style }).addTo(map);
          addOverlays();
        })
        .catch((err) => {
          console.warn("Style failed, falling back to CARTO:", err);
          L.tileLayer(
            "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
            {
              maxZoom: 20,
              subdomains: "abcd",
              attribution: "© OpenStreetMap © CARTO",
            },
          ).addTo(map);
          addOverlays();
        });

      // ─── SPONSOR LOCATIONS ─────────────────────────────────
      const SPONSORS = [
        {
          name: "ADB Safegate",
          coords: [50.919341117150054, 4.435063024176051],
          logo: "adb_safegate.png",
        },
        {
          name: "Axalta",
          coords: [51.01321094832159, 4.460759298102695],
          logo: "Axalta_logo.png",
        },
        {
          name: "Axxes",
          coords: [51.2340081170945, 4.412692886089986],
          logo: "Axxes.png",
        },
        {
          name: "Bleyweert",
          coords: [50.791463311269936, 5.453372300793283],
          logo: "bleyweert_logo.png",
        },
        {
          name: "BO Solutions",
          coords: [50.97739452658593, 3.1215353770698275],
          logo: "bo solutions.jpg",
        },
        {
          name: "Bridgestone",
          coords: [50.88993741443913, 4.460360501250405],
          logo: "Bridgestone-Logo.png",
        },

      // ─── OVERLAYS ──────────────────────────────────────────
      function addOverlays() {
        // Draw all 10 route segments
        STINTS.forEach((coords, i) => {
          L.polyline(coords, {
            color: "#00aa77",
            weight: 5,
            opacity: 0.85,
            interactive: false,
          }).addTo(map);

          // Wide invisible line for tooltip interaction
          L.polyline(coords, { color: "#00aa77", weight: 22, opacity: 0.001 })
            .addTo(map)
            .bindTooltip(
              `<span class="stint-tt-label">${STINT_TIMES[i].label}</span>${STINT_TIMES[i].time}`,
              { className: "stint-tt", sticky: true },
            )
            .on("mousedown", (e) => L.DomEvent.stop(e))
            .on("click", (e) => L.DomEvent.stop(e))
            .on("dblclick", (e) => L.DomEvent.stop(e));
        });

        // ── Partner stop markers ──────────────────────────────
        const partnerIcon = L.divIcon({
          className: "",
          iconSize: [30, 30],
          iconAnchor: [15, 36],
          html: '<div class="partner-marker"><div></div></div>',
        });

        const isTouch =
          "ontouchstart" in window || navigator.maxTouchPoints > 0;

        PARTNERS.forEach((p) => {
          const ttHtml = `<div class="partner-tt-inner"><img src="${p.logo}" alt="${p.role}" /></div>`;
          const popupHtml = `
            <div class="partner-popup-inner">
              <div class="partner-popup-logo"><img src="${p.logo}" alt="${p.role}" /></div>
              <div class="partner-popup-role">${p.role}</div>
              ${p.time ? `<div class="partner-popup-time">${p.time}</div>` : ""}
            </div>`;
          const marker = L.marker(p.coords, { icon: partnerIcon })
            .addTo(map)
            .bindPopup(popupHtml, { maxWidth: 220 });
          if (!isTouch) {
            marker.bindTooltip(ttHtml, {
              className: "partner-tt",
              direction: "top",
              offset: [0, -22],
            });
          }
        });

        // ── Scheduled break markers ───────────────────────────
        const breakIcon = L.divIcon({
          className: "",
          iconSize: [20, 20],
          iconAnchor: [10, 24],
          html: '<div class="break-marker"><div></div></div>',
        });

        SCHEDULED_BREAKS.forEach((b) => {
          const icon =
            b.name === "Lunchtime"
              ? "🍽️"
              : b.name.toLowerCase().includes("photo")
                ? "📸"
                : "⏸️";
          const popupHtml = `
            <div class="break-popup-inner">
              <div class="break-popup-icon">${icon}</div>
              <div class="break-popup-name">${b.name}</div>
              <div class="break-popup-time">${b.time}</div>
            </div>`;
          const ttHtml = `<span class="break-tt-label">${b.name}</span>${b.time}`;
          const marker = L.marker(b.coords, { icon: breakIcon })
            .addTo(map)
            .bindPopup(popupHtml, { maxWidth: 150, className: "break-popup" });
          if (!isTouch) {
            marker.bindTooltip(ttHtml, {
              className: "break-tt",
              direction: "top",
              offset: [0, -16],
            });
          }
        });

        // ── Sponsor markers ───────────────────────────────────
        const sponsorIcon = L.divIcon({
          className: "",
          iconSize: [12, 12],
          iconAnchor: [6, 6],
          html: '<div class="sponsor-marker"></div>',
        });

        SPONSORS.forEach((s) => {
          const logoContent = s.logo
            ? `<img src="${s.logo}" alt="${s.name}" />`
            : `<span class="sponsor-popup-placeholder">${s.name[0]}</span>`;
          const popupHtml = `
            <div class="sponsor-popup-inner">
              <div class="sponsor-popup-logo${s.darkBg ? " dark-bg" : ""}">${logoContent}</div>
              <div class="sponsor-popup-name">${s.name}</div>
              <div class="sponsor-popup-role">Partner</div>
            </div>`;
          L.marker(s.coords, { icon: sponsorIcon })
            .addTo(map)
            .bindPopup(popupHtml, { maxWidth: 200 });
        });

        map.fitBounds(routeBounds, { padding: [50, 50] });
      }

      // ─── ZOOM SCALE ────────────────────────────────────────
      map.on("zoomend", () => {
        const z = map.getZoom();
        const w = document.querySelector(".live-marker-wrapper");
        if (!w) return;
        const s =
          z <= 9 ? 0.45 : z <= 10 ? 0.6 : z <= 11 ? 0.75 : z <= 12 ? 0.9 : 1;
        w.style.transform = `scale(${s})`;
      });

      // ─── LIVE GPS ──────────────────────────────────────────
      function formatCEST(epochSeconds) {
        return new Date(epochSeconds * 1000).toLocaleTimeString("en-GB", {
          timeZone: "Europe/Brussels",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });
      }

      function speedPopupHtml(kmh, epochTime) {
        const timeStr = epochTime ? formatCEST(epochTime) + " CEST" : "—";
        return `<div class="live-popup-inner">
          <div class="live-popup-name">Infinite Apollo</div>
          <div class="live-popup-label">Current Speed</div>
          <div class="live-popup-speed">${kmh}</div>
          <div class="live-popup-unit">km/h</div>
          <div class="live-popup-time">Last updated: ${timeStr}</div>
        </div>`;
      }

      function createLiveMarker(lat, lng, kmh = 0, isoTime = null) {
        return L.marker([lat, lng], {
          icon: L.divIcon({
            className: "",
            iconSize: [0, 0],
            html: `<div class="live-marker-wrapper">
                    <div class="live-ring paused"></div>
                    <div class="live-core"><img src="innoptus_icon_wit.png" alt="Innoptus" /></div>
                  </div>`,
          }),
          zIndexOffset: 1000,
        })
          .addTo(map)
          .bindPopup(speedPopupHtml(kmh, isoTime), { maxWidth: 180 });
      }

      let lastDbTime = null;
      let interpRAF = null;
      let finishTriggered = false;
      const POLL_MS = 5000;
      const INTERP_MS = 4500;
      const FINISH_COORDS = STINTS[9][STINTS[9].length - 1];

      function fireFinishConfetti() {
        const colors = ["#00aa77", "#2754a4", "#f9fbfb", "#ffd700"];
        const burst = (origin) =>
          confetti({
            particleCount: 120,
            spread: 80,
            origin,
            colors,
            zIndex: 9999,
          });
        burst({ x: 0.3, y: 0.75 });
        setTimeout(() => burst({ x: 0.7, y: 0.75 }), 150);
        setTimeout(() => burst({ x: 0.5, y: 0.65 }), 300);
      }

      function moveMarkerTo(lat, lng) {
        if (interpRAF) {
          cancelAnimationFrame(interpRAF);
          interpRAF = null;
        }
        const from = liveMarker.getLatLng();
        let startTime = null;
        function step(ts) {
          if (!startTime) startTime = ts;
          const t = Math.min((ts - startTime) / INTERP_MS, 1);
          liveMarker.setLatLng([
            from.lat + (lat - from.lat) * t,
            from.lng + (lng - from.lng) * t,
          ]);
          if (t < 1) interpRAF = requestAnimationFrame(step);
          else interpRAF = null;
        }
        interpRAF = requestAnimationFrame(step);
      }

      function centreOnLive(lat, lng) {
        if (firstFix && lat !== undefined && lng !== undefined) {
          map.stop();
          map.flyTo([lat, lng], 14, { animate: true, duration: 1.8 });
          firstFix = false;
        }
      }

      const STALE_MS = 30000;

      function applyStaleState(isoTime) {
        const isStale =
          !isoTime ||
          Date.now() - new Date(isoTime * 1000).getTime() > STALE_MS;
        document
          .getElementById("stale-overlay")
          .classList.toggle("visible", isStale && !finishTriggered);
        const ring = document.querySelector(".live-ring");
        if (ring) ring.classList.toggle("paused", isStale);
        return isStale;
      }

      async function fetchLivePosition() {
        try {
          const data = await (await fetch(GPS_ENDPOINT)).json();
          if (!data || data.lat === undefined) return;
          const raw = data.spd || 0;
          const kmh = raw < 0.5 ? "0" : raw.toFixed(1);
          const isoTime = data.time || null;
          if (isoTime) lastDbTime = new Date(isoTime * 1000);

          if (!liveMarker) {
            liveMarker = createLiveMarker(data.lat, data.lng, kmh, isoTime);
          } else {
            moveMarkerTo(data.lat, data.lng);
            liveMarker.setPopupContent(speedPopupHtml(kmh, isoTime));
          }

          if (!finishTriggered) {
            const dist = L.latLng(data.lat, data.lng).distanceTo(
              L.latLng(FINISH_COORDS[0], FINISH_COORDS[1]),
            );
            if (dist <= 80) {
              finishTriggered = true;
              document
                .getElementById("finish-overlay")
                .classList.add("visible");
              // setTimeout(fireFinishConfetti, 3000);
            }
          }

          applyStaleState(isoTime);
          centreOnLive(data.lat, data.lng);
        } catch (e) {
          console.error("GPS fetch error", e);
        }
      }

      // ─── FAKE LIVE MARKER (live tracking temporarily disabled) ───
      const _fakePos = STINTS[0][0];
      liveMarker = createLiveMarker(_fakePos[0], _fakePos[1], 0);
      document.getElementById("waiting-overlay").classList.add("visible");

      // setInterval(fetchLivePosition, POLL_MS);
      // fetchLivePosition();
    </script>
