<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Innoptus Live Route Tracker</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Muli:wght@400;600;700;900&display=swap");

      :root {
        --prussian-blue: #192c46;
        --bdazzled-blue: #2754a4;
        --green-munseli: #00aa77;
        --brand-white: #f9fbfb;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--prussian-blue);
        color: var(--brand-white);
        font-family: "Muli", sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ─── HEADER ─────────────────────────────────────────── */
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        height: 60px;
        background: var(--bdazzled-blue);
        border-bottom: 2px solid var(--green-munseli);
        z-index: 1000;
      }

      .logo-img {
        height: 35px;
      }

      .live-badge {
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(0, 170, 119, 0.15);
        border: 1px solid var(--green-munseli);
        border-radius: 4px;
        padding: 6px 16px;
        font-weight: 900;
        font-size: 14px;
        color: var(--green-munseli);
      }

      .live-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--green-munseli);
        animation: pulse 1.5s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(0.8);
          opacity: 0.5;
        }
      }

      /* ─── MAP AREA ───────────────────────────────────────── */
      #map {
        flex: 1;
        background: var(--prussian-blue);
      }

      /* ─── CUSTOM MARKERS ─────────────────────────────────── */
      .live-marker-wrapper {
        position: relative;
        transition: transform 0.3s;
      }
      .live-ring {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 2px solid var(--green-munseli);
        position: absolute;
        top: -22px;
        left: -22px;
        animation: ring-pulse 2s infinite;
        box-shadow: 0 0 12px var(--green-munseli);
      }
      .live-core {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: var(--green-munseli);
        border: 2px solid #0d1b2e;
        position: absolute;
        top: -8px;
        left: -8px;
        box-shadow:
          0 0 20px var(--green-munseli),
          0 0 40px rgba(0, 229, 160, 0.4);
      }
      @keyframes ring-pulse {
        0% {
          transform: scale(1);
          opacity: 0.9;
        }
        100% {
          transform: scale(2.5);
          opacity: 0;
        }
      }

      /* Partner Stop Marker */
      .partner-marker {
        width: 24px;
        height: 24px;
        background: var(--brand-white);
        border: 3px solid var(--green-munseli);
        border-radius: 50% 50% 50% 0;
        transform: rotate(-45deg);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 10px rgba(0, 229, 160, 0.5);
      }
      .partner-marker div {
        transform: rotate(45deg);
        width: 8px;
        height: 8px;
        background: var(--prussian-blue);
        border-radius: 50%;
      }

      /* Popup Styling */
      .leaflet-popup-content-wrapper {
        background: var(--prussian-blue) !important;
        color: var(--brand-white) !important;
        border: 1px solid var(--green-munseli) !important;
        font-family: "Muli", sans-serif;
      }
      .leaflet-popup-tip {
        background: var(--prussian-blue) !important;
      }

      /* Glow filter for SVG overlay (routes) */
      .leaflet-overlay-pane svg {
        filter: drop-shadow(0 0 3px rgba(0, 229, 160, 0.4))
          drop-shadow(0 0 7px rgba(0, 229, 160, 0.15));
      }

      /* ─── PARTNER TOOLTIP (hover) ────────────────────────── */
      .partner-tt.leaflet-tooltip {
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        padding: 0 !important;
      }
      .partner-tt.leaflet-tooltip::before {
        display: none !important;
      }
      .partner-tt-inner {
        background: #fff;
        border: 2px solid var(--green-munseli);
        border-radius: 10px;
        padding: 8px 14px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        min-width: 110px;
        box-shadow: 0 4px 16px rgba(0, 170, 119, 0.25);
        pointer-events: none;
      }
      .partner-tt-inner img {
        max-height: 38px;
        max-width: 110px;
        object-fit: contain;
      }
      .partner-tt-inner span {
        color: var(--prussian-blue);
        font-family: "Muli", sans-serif;
        font-size: 11px;
        font-weight: 700;
        text-align: center;
      }
      .partner-tt-fallback {
        font-size: 22px;
        font-weight: 900;
        color: var(--prussian-blue);
        line-height: 1;
      }

      /* ─── PARTNER POPUP (click) ──────────────────────────── */
      .partner-popup-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        padding: 6px 4px 2px;
      }
      .partner-popup-logo {
        background: #fff;
        border-radius: 8px;
        padding: 10px 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 140px;
        min-height: 64px;
      }
      .partner-popup-logo img {
        max-height: 52px;
        max-width: 140px;
        object-fit: contain;
      }
      .partner-popup-name {
        color: var(--green-munseli);
        font-size: 15px;
        font-weight: 900;
        text-align: center;
      }
      .partner-popup-role {
        color: rgba(249, 251, 251, 0.55);
        font-size: 11px;
        text-align: center;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <header>
      <img src="Langwerpig_TekstWit.svg" alt="Innoptus Logo" class="logo-img" />
      <div id="status-text" style="font-size: 12px; opacity: 0.8">
        Awaiting GPS...
      </div>
      <div class="live-badge">
        <div class="live-dot"></div>
        LIVE
      </div>
    </header>

    <div id="map"></div>

    <script src="routeData.js"></script>
    <script>
      // ─── CONFIG ────────────────────────────────────────────────────────
      const GPS_ENDPOINT =
        "https://solar-tracker-ab9a8-default-rtdb.europe-west1.firebasedatabase.app/gps/latest.json";
      let liveMarker = null;
      let firstFix = true;

      // ─── PARTNER DATA ──────────────────────────────────────────────────
      const PARTNERS = [
        {
          name: "Sibelco",
          role: "Start",
          coords: STINTS[0][0],
          logo: "Sibelco_logo.png",
        },
        {
          name: "Indupol",
          role: "Partner Stop",
          coords: STINTS[1][0],
          logo: "INDUPOL_LOGO_RGB-01-1.svg",
        },
        {
          name: "DEME",
          role: "Partner Stop",
          coords: STINTS[2][0],
          logo: "DEME.BR_BIG.svg",
        },
        {
          name: "PwC",
          role: "Partner Stop",
          coords: STINTS[3][0],
          logo: "PWC.svg",
        },
        {
          name: "KBC",
          role: "Partner Stop",
          coords: STINTS[4][0],
          logo: "KBC_logo.svg",
        },
        {
          name: "Groep T",
          role: "Finish",
          coords: STINTS[4][STINTS[4].length - 1],
          logo: null,
        },
      ];

      // ─── INIT MAP ──────────────────────────────────────────────────────
      const allPoints = STINTS.flat();
      const routeBounds = L.latLngBounds(allPoints);

      const map = L.map("map", {
        center: routeBounds.getCenter(),
        zoom: 10,
        maxBounds: routeBounds.pad(0.2),
        maxBoundsViscosity: 1.0,
        minZoom: 10,
        maxZoom: 18,
        zoomControl: false,
      });

      // ─── TILE LAYER: dark-matter-nolabels for cleaner blue tint ────────
      L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
        { maxZoom: 20, subdomains: "abcd" },
      ).addTo(map);

      // Draw Route in Green Munseli
      STINTS.forEach((coords) => {
        L.polyline(coords, {
          color: "#00aa77",
          weight: 5,
          opacity: 0.75,
        }).addTo(map);
      });

      // Add Partner Markers
      const partnerIcon = L.divIcon({
        className: "",
        iconSize: [24, 24],
        iconAnchor: [12, 24],
        html: '<div class="partner-marker"><div></div></div>',
      });

      PARTNERS.forEach((p) => {
        const logoImg = p.logo
          ? `<img src="${p.logo}" alt="${p.name}" />`
          : `<div class="partner-tt-fallback">${p.name[0]}</div>`;

        const tooltipHtml = `
          <div class="partner-tt-inner">
            ${logoImg}
            <span>${p.name}</span>
          </div>`;

        const popupLogoHtml = p.logo
          ? `<img src="${p.logo}" alt="${p.name}" />`
          : `<span style="color:var(--prussian-blue);font-weight:900;font-size:22px">${p.name}</span>`;

        const popupHtml = `
          <div class="partner-popup-inner">
            <div class="partner-popup-logo">${popupLogoHtml}</div>
            <div class="partner-popup-name">${p.name}</div>
            <div class="partner-popup-role">${p.role}</div>
          </div>`;

        L.marker(p.coords, { icon: partnerIcon })
          .addTo(map)
          .bindTooltip(tooltipHtml, {
            className: "partner-tt",
            direction: "top",
            offset: [0, -22],
          })
          .bindPopup(popupHtml, { maxWidth: 220 });
      });

      map.fitBounds(routeBounds, { padding: [50, 50] });

      // ─── SCALING LOGIC ────────────────────────────────────────────────
      map.on("zoomend", function () {
        const currentZoom = map.getZoom();
        const wrapper = document.querySelector(".live-marker-wrapper");
        if (wrapper) {
          let scale = currentZoom < 9 ? 0.5 : currentZoom < 12 ? 0.8 : 1.2;
          wrapper.style.transform = `scale(${scale})`;
        }
      });

      // ─── LIVE TRACKING ────────────────────────────────────────────────
      function createLiveMarker(lat, lng) {
        const icon = L.divIcon({
          className: "",
          iconSize: [0, 0],
          html: `<div class="live-marker-wrapper"><div class="live-ring"></div><div class="live-core"></div></div>`,
        });
        return L.marker([lat, lng], { icon, zIndexOffset: 1000 }).addTo(map);
      }

      async function fetchLivePosition() {
        try {
          const res = await fetch(GPS_ENDPOINT);
          const data = await res.json();
          if (!data || data.lat === undefined) return;

          if (!liveMarker) {
            liveMarker = createLiveMarker(data.lat, data.lng);
          } else {
            liveMarker.setLatLng([data.lat, data.lng]);
          }

          document.getElementById("status-text").textContent =
            `Speed: ${Math.round(data.speed || 0)} km/h`;

          if (firstFix) {
            map.flyTo([data.lat, data.lng], 14, {
              animate: true,
              duration: 2.5,
            });
            firstFix = false;
          }
        } catch (e) {
          console.error("GPS Fetch Error", e);
        }
      }

      setInterval(fetchLivePosition, 5000);
      fetchLivePosition();
    </script>
  </body>
</html>
