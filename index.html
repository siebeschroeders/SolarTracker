<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Innoptus Live Route Tracker</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Muli:wght@400;600;700;900&display=swap");

      :root {
        --prussian-blue: #192c46;
        --bdazzled-blue: #2754a4;
        --green-munseli: #00aa77;
        --brand-white: #f9fbfb;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--prussian-blue);
        color: var(--brand-white);
        font-family: "Muli", sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ─── HEADER ─────────────────────────────────────────── */
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        height: 60px;
        background: var(--bdazzled-blue);
        border-bottom: 2px solid var(--green-munseli);
        z-index: 1000;
      }

      .logo-img {
        height: 35px;
      }

      .live-badge {
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(0, 170, 119, 0.15);
        border: 1px solid var(--green-munseli);
        border-radius: 4px;
        padding: 6px 16px;
        font-weight: 900;
        font-size: 14px;
        color: var(--green-munseli);
      }

      .live-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--green-munseli);
        animation: pulse 1.5s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(0.8);
          opacity: 0.5;
        }
      }

      /* ─── MAP AREA ───────────────────────────────────────── */
      #map {
        flex: 1;
        background: var(--prussian-blue);
      }

      .leaflet-tile-pane {
        filter: sepia(100%) hue-rotate(185deg) saturate(180%) brightness(0.5)
          contrast(1.1);
      }

      /* ─── CUSTOM MARKERS ─────────────────────────────────── */
      .live-marker-wrapper {
        position: relative;
        transition: transform 0.3s;
      }
      .live-ring {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 2px solid var(--green-munseli);
        position: absolute;
        top: -20px;
        left: -20px;
        animation: ring-pulse 2s infinite;
      }
      .live-core {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--green-munseli);
        border: 2px solid var(--prussian-blue);
        position: absolute;
        top: -7px;
        left: -7px;
        box-shadow: 0 0 15px var(--green-munseli);
      }
      @keyframes ring-pulse {
        0% {
          transform: scale(1);
          opacity: 0.8;
        }
        100% {
          transform: scale(2.2);
          opacity: 0;
        }
      }

      /* Partner Stop Marker */
      .partner-marker {
        width: 24px;
        height: 24px;
        background: var(--brand-white);
        border: 3px solid var(--green-munseli);
        border-radius: 50% 50% 50% 0;
        transform: rotate(-45deg);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .partner-marker div {
        transform: rotate(45deg);
        width: 8px;
        height: 8px;
        background: var(--prussian-blue);
        border-radius: 50%;
      }

      /* Popup Styling */
      .leaflet-popup-content-wrapper {
        background: var(--prussian-blue);
        color: var(--brand-white);
        border: 1px solid var(--green-munseli);
        font-family: "Muli", sans-serif;
      }
      .leaflet-popup-tip {
        background: var(--green-munseli);
      }
    </style>
  </head>
  <body>
    <header>
      <img src="Langwerpig_TekstWit.svg" alt="Innoptus Logo" class="logo-img" />
      <div id="status-text" style="font-size: 12px; opacity: 0.8">
        Awaiting GPS...
      </div>
      <div class="live-badge">
        <div class="live-dot"></div>
        LIVE
      </div>
    </header>

    <div id="map"></div>

    <script src="routeData.js"></script>
    <script>
      // ─── CONFIG ────────────────────────────────────────────────────────
      const GPS_ENDPOINT =
        "https://solar-tracker-ab9a8-default-rtdb.europe-west1.firebasedatabase.app/gps/latest.json";
      let liveMarker = null;
      let firstFix = true;

      // ─── PARTNER DATA ──────────────────────────────────────────────────
      // Mapping names to the start of each stint based on your prompt
      const PARTNERS = [
        { name: "Sibelco (Start)", coords: STINTS[0][0] },
        { name: "Indupol", coords: STINTS[1][0] },
        { name: "DEME", coords: STINTS[2][0] },
        { name: "PwC", coords: STINTS[3][0] },
        { name: "KBC", coords: STINTS[3][STINTS[3].length - 1] },
        { name: "Groep T (Finish)", coords: STINTS[4][STINTS[4].length - 1] },
      ];

      // ─── INIT MAP ──────────────────────────────────────────────────────
      const allPoints = STINTS.flat();
      const routeBounds = L.latLngBounds(allPoints);

      const map = L.map("map", {
        center: routeBounds.getCenter(),
        zoom: 10,
        zoomControl: false,
      });

      L.tileLayer(
        "https://tiles.stadiamaps.com/tiles/alidade_smooth_dark/{z}/{x}/{y}{r}.png",
      ).addTo(map);

      // Draw Route in Green Munseli
      STINTS.forEach((coords) => {
        L.polyline(coords, {
          color: "#00aa77",
          weight: 5,
          opacity: 0.75,
        }).addTo(map);
      });

      // Add Partner Markers
      const partnerIcon = L.divIcon({
        className: "",
        iconSize: [24, 24],
        iconAnchor: [12, 24],
        html: '<div class="partner-marker"><div></div></div>',
      });

      PARTNERS.forEach((p) => {
        L.marker(p.coords, { icon: partnerIcon })
          .addTo(map)
          .bindPopup(`<b style="color:var(--green-munseli)">${p.name}</b>`);
      });

      map.fitBounds(routeBounds, { padding: [50, 50] });

      // ─── SCALING LOGIC ────────────────────────────────────────────────
      map.on("zoomend", function () {
        const currentZoom = map.getZoom();
        const wrapper = document.querySelector(".live-marker-wrapper");
        if (wrapper) {
          let scale = currentZoom < 9 ? 0.5 : currentZoom < 12 ? 0.8 : 1.2;
          wrapper.style.transform = `scale(${scale})`;
        }
      });

      // ─── LIVE TRACKING ────────────────────────────────────────────────
      function createLiveMarker(lat, lng) {
        const icon = L.divIcon({
          className: "",
          iconSize: [0, 0],
          html: `<div class="live-marker-wrapper"><div class="live-ring"></div><div class="live-core"></div></div>`,
        });
        return L.marker([lat, lng], { icon, zIndexOffset: 1000 }).addTo(map);
      }

      async function fetchLivePosition() {
        try {
          const res = await fetch(GPS_ENDPOINT);
          const data = await res.json();
          if (!data || data.lat === undefined) return;

          if (!liveMarker) {
            liveMarker = createLiveMarker(data.lat, data.lng);
          } else {
            liveMarker.setLatLng([data.lat, data.lng]);
          }

          document.getElementById("status-text").textContent =
            `Speed: ${Math.round(data.speed || 0)} km/h`;

          if (firstFix) {
            map.flyTo([data.lat, data.lng], 14, {
              animate: true,
              duration: 2.5,
            });
            firstFix = false;
          }
        } catch (e) {
          console.error("GPS Fetch Error", e);
        }
      }

      setInterval(fetchLivePosition, 5000);
      fetchLivePosition();
    </script>
  </body>
</html>
